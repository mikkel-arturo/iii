name: Worker Bare
description: Minimal standalone iii worker scaffold (one language).
version: "0.1.0"
min_iii_version: "0.11.0"

treat_required_as_included: false
requires: []
optional:
  - typescript
  - javascript
  - python
  - rust

# Enumerates every language-specific file the template ships. Each entry
# is gated by the root manifest's `language_files` patterns so only files
# matching the selected language land in the scaffolded dir. Each language
# ships its own iii.worker.<lang>.yaml; the `renames` block below collapses
# the survivor onto iii.worker.yaml at copy time.
files:
  - iii.worker.ts.yaml
  - iii.worker.js.yaml
  - iii.worker.py.yaml
  - iii.worker.rust.yaml
  - package.ts.json
  - package.js.json
  - tsconfig.json
  - src/index.ts
  - src/index.js
  - pyproject.toml
  - src/main.py
  - Cargo.toml
  - src/main.rs

# Rename the language-tagged survivor onto its canonical destination. Only the
# selected language's source is copied (gated by language_files), so the shared
# destinations never collide within one scaffold.
renames:
  - source: iii.worker.ts.yaml
    dest: iii.worker.yaml
  - source: iii.worker.js.yaml
    dest: iii.worker.yaml
  - source: iii.worker.py.yaml
    dest: iii.worker.yaml
  - source: iii.worker.rust.yaml
    dest: iii.worker.yaml
  - source: package.ts.json
    dest: package.json
  - source: package.js.json
    dest: package.json

next_steps:
  - "Install deps (npm install / uv sync / cargo build)"
  - "Edit iii.worker.yaml to declare your entry point"
  - "Add to a parent project: iii worker add ./path/to/this-worker"
